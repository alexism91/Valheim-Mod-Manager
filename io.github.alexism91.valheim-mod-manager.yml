app-id: io.github.alexism91.valheim-mod-manager
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: valheim-mod-manager
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-data/Steam:rw

modules:
  - name: valheim-mod-manager
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
      - install -Dm644 io.github.alexism91.valheim-mod-manager.desktop /app/share/applications/io.github.alexism91.valheim-mod-manager.desktop
      - install -Dm644 io.github.alexism91.valheim-mod-manager.metainfo.xml /app/share/metainfo/io.github.alexism91.valheim-mod-manager.metainfo.xml
      - install -Dm644 io.github.alexism91.valheim-mod-manager.png /app/share/icons/hicolor/128x128/apps/io.github.alexism91.valheim-mod-manager.png
    sources:
      - type: git
        url: https://github.com/alexism91/Valheim-Mod-Manager
        tag: v1.0.0
        commit: ed76749b4bbc1ec499652e6e4c6430f05d6c8133
